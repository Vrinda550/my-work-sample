<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Tracker - Internshala Work Sample</title>
    <style>
        /* --- CSS STYLING --- */
        :root {
            --primary-color: #4a90e2;
            --bg-color: #f5f7fb;
            --card-bg: #ffffff;
            --text-color: #333333;
            --border-color: #e0e0e0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 480px;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
        }

        h2 {
            margin-bottom: 20px;
            text-align: center;
            color: var(--primary-color);
        }

        /* Input Section */
        .input-area {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 14px;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: var(--primary-color);
        }

        select {
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background: #fff;
            cursor: pointer;
        }

        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 18px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #357abd;
        }

        /* Task List Section */
        ul {
            list-style: none;
            max-height: 300px;
            overflow-y: auto;
        }

        li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid var(--border-color);
            transition: all 0.3s ease;
        }

        .task-text {
            cursor: pointer;
            flex: 1;
            margin-left: 10px;
        }

        .completed .task-text {
            text-decoration: line-through;
            color: #888;
        }

        .tag {
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 12px;
            margin-left: 8px;
            font-weight: 600;
        }

        .tag-college { background-color: #e3f2fd; color: #0d47a1; }
        .tag-personal { background-color: #e8f5e9; color: #1b5e20; }
        .tag-other { background-color: #f3e5f5; color: #4a148c; }

        .delete-btn {
            background-color: #ff5252;
            padding: 6px 10px;
            font-size: 12px;
        }

        .delete-btn:hover {
            background-color: #d32f2f;
        }

        /* Stats Section */
        .stats {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 2px dashed var(--border-color);
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            color: #666;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Task Tracker</h2>
        
        <div class="input-area">
            <input type="text" id="taskInput" placeholder="Add a new task..." autocomplete="off">
            <select id="categorySelect">
                <option value="college">College</option>
                <option value="personal">Personal</option>
                <option value="other">Other</option>
            </select>
            <button onclick="addTask()">Add</button>
        </div>

        <ul id="taskList"></ul>

        <div class="stats">
            <span id="totalTasks">Total: 0</span>
            <span id="completedTasks">Completed: 0</span>
        </div>
    </div>

    <script>
        const taskInput = document.getElementById('taskInput');
        const categorySelect = document.getElementById('categorySelect');
        const taskList = document.getElementById('taskList');
        const totalTasksSpan = document.getElementById('totalTasks');
        const completedTasksSpan = document.getElementById('completedTasks');

        let tasks = [];

        // Function to render tasks to the UI
        function renderTasks() {
            taskList.innerHTML = '';
            
            tasks.forEach((task, index) => {
                const li = document.createElement('li');
                if (task.completed) li.classList.add('completed');

                li.innerHTML = `
                    <input type="checkbox" ${task.completed ? 'checked' : ''} onchange="toggleTask(${index})">
                    <span class="task-text" onclick="toggleTask(${index})">${task.text}</span>
                    <span class="tag tag-${task.category}">${task.category.toUpperCase()}</span>
                    <button class="delete-btn" onclick="deleteTask(${index})">Delete</button>
                `;
                taskList.appendChild(li);
            });

            updateStats();
        }

        // Function to add a new task
        function addTask() {
            const text = taskInput.value.trim();
            if (text === '') return;

            const category = categorySelect.value;
            
            tasks.push({
                text: text,
                category: category,
                completed: false
            });

            taskInput.value = '';
            renderTasks();
        }

        // Function to toggle check/uncheck
        function toggleTask(index) {
            tasks[index].completed = !tasks[index].completed;
            renderTasks();
        }

        // Function to delete a task
        function deleteTask(index) {
            tasks.splice(index, 1);
            renderTasks();
        }

        // Function to update the task counter numbers
        function updateStats() {
            const total = tasks.length;
            const completed = tasks.filter(t => t.completed).length;
            
            totalTasksSpan.textContent = `Total: ${total}`;
            completedTasksSpan.textContent = `Completed: ${completed}`;
        }

        // Allow pressing "Enter" key to add task
        taskInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                addTask();
            }
        });
    </script>
</body>
</html>
